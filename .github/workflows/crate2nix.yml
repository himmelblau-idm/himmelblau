# crate2nix action
#
# Check if the Cargo.nix is up-to-date and if not register the new one as artifact so contributors do not have to install nix
name: "crate2nix: Cargo.nix check"
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  crate2nix:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d

      - name: Generate Cargo.nix
        run: nix run nixpkgs#crate2nix -- generate

      - name: Check for modifications
        id: check
        run: git diff --quiet Cargo.nix || echo "modified=true" >> "$GITHUB_OUTPUT"

      - name: Upload updated Cargo.nix
        if: steps.check.outputs.modified == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: Cargo.nix
          archive: false

      - name: Fail if modified
        if: steps.check.outputs.modified == 'true'
        run: |
          echo "::error file=Cargo.nix::Cargo.nix is out of date. Please download the 'Cargo.nix' artifact from this run summary (or run 'crate2nix generate' locally) and commit the changes."
          exit 1
