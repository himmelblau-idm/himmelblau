---
name: Publish AUR Package

# Triggered by:
#   - version tag pushes from the "Rust Version Tagging" workflow (e.g. "4.0.0")
#   - explicit GitHub Releases (catches manual republish edge cases)
#   - workflow_dispatch with optional version + dry_run inputs for safe testing
#
# Architecture:
#   - PKGBUILD source-of-truth: platform/arch/PKGBUILD.in (sentinel template, hand-edited).
#   - sed substitutes @PKGVER@ and @SHA256@; .SRCINFO is generated by the action, never committed.
#   - SSH+git+push is delegated to KSXGitHub/github-actions-deploy-aur (SHA-pinned).
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to publish (default: latest upstream release)'
        required: false
        type: string
      dry_run:
        description: 'Dry run: render + validate PKGBUILD but skip the AUR push'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Prevent concurrent publishes racing each other (e.g. two tag pushes back-to-back).
concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  aur-publish:
    name: Update AUR package
    runs-on: ubuntu-latest

    # Upstream repo that publishes the release tarballs the AUR PKGBUILD
    # references in its source=() line. Hardcoded so this workflow can live
    # on a fork (where ${{ github.repository }} would be the fork) without
    # 404-ing on the tarball fetch. When this workflow is upstreamed, change
    # to ${{ github.repository }} or delete the env (gh release / curl will
    # fall back to the current repo automatically).
    env:
      SOURCE_REPO: himmelblau-idm/himmelblau

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ── Resolve the version to publish ──────────────────────────────────────
      # Priority:
      #   1. workflow_dispatch input (manual override)
      #   2. tag name from the push event (strip leading 'v' if present)
      #   3. GitHub API "latest release" (decouples AUR version from whatever
      #      tag triggered this run — protects against test/pre-release tags
      #      causing a 404 on the tarball fetch).
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION#v}"
            echo "Source: workflow_dispatch input → ${VERSION}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Source: triggering tag → ${VERSION}"
          else
            VERSION="$(gh release view --repo "${SOURCE_REPO}" --json tagName -q '.tagName' | sed 's/^v//')"
            echo "Source: GitHub latest release on ${SOURCE_REPO} → ${VERSION}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "::error::Could not resolve a version to publish"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      # ── Compute SHA-256 of the upstream release tarball ─────────────────────
      # Tries bare ("4.0.0") then v-prefixed ("v4.0.0") tag forms — GitHub
      # exposes whichever matches the actual tag. The URL must exactly match
      # the source= line that PKGBUILD.in will be rendered with.
      - name: Compute source tarball SHA-256
        id: sha256
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/${SOURCE_REPO}"
          SHA=""
          TMPTAR="$(mktemp)"
          trap 'rm -f "${TMPTAR}"' EXIT

          for TAG_FORM in "${VERSION}" "v${VERSION}"; do
            URL="${REPO_URL}/archive/refs/tags/${TAG_FORM}.tar.gz"
            echo "Trying ${URL} …"
            HTTP="$(curl -fsSL --max-time 300 --retry 3 \
                    -w '%{http_code}' -o "${TMPTAR}" "${URL}" 2>/dev/null || echo "000")"
            if [ "${HTTP}" = "200" ]; then
              SHA="$(sha256sum "${TMPTAR}" | awk '{print $1}')"
              echo "  → ok, sha256=${SHA}"
              break
            fi
            echo "  → HTTP ${HTTP}, trying next form …"
          done

          if [ -z "${SHA}" ]; then
            echo "::error::Release tarball not found for ${VERSION} at ${REPO_URL}"
            exit 1
          fi
          echo "sha256=${SHA}" >> "${GITHUB_OUTPUT}"

      # ── Render PKGBUILD from the sentinel template ──────────────────────────
      # Two substitutions, no Python, no generator script. .SRCINFO is left to
      # the deploy action (which runs makepkg --printsrcinfo inside archlinux:latest).
      - name: Render PKGBUILD from PKGBUILD.in
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p aur-work
          sed -e "s|@PKGVER@|${VERSION}|g" \
              -e "s|@SHA256@|${SHA256}|g" \
              platform/arch/PKGBUILD.in > aur-work/PKGBUILD
          cp platform/arch/himmelblau.install aur-work/himmelblau.install
          echo "── rendered PKGBUILD ──"
          cat aur-work/PKGBUILD

      # ── Sanity-check before handing off to the deploy action ────────────────
      # Cheap shellcheck-ish parse; namcap runs inside the deploy action's
      # archlinux container so we don't need it locally on ubuntu-latest.
      - name: Validate rendered PKGBUILD
        run: |
          set -euo pipefail
          bash -n aur-work/PKGBUILD
          grep -q "^pkgver=${{ steps.version.outputs.version }}\$" aur-work/PKGBUILD
          grep -q "^sha256sums=('${{ steps.sha256.outputs.sha256 }}')\$" aur-work/PKGBUILD
          echo "✓ rendered PKGBUILD has expected pkgver + sha256sums"

      # ── Generate .SRCINFO inside archlinux so it can be inspected ───────────
      # Mirrors what the KSXGitHub action does internally — by doing it here
      # too we (a) catch metadata regressions before the action runs and
      # (b) make the .SRCINFO available as a workflow artifact for dry runs.
      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/aur-work:/work" -w /work archlinux:base-devel bash -c '
            sed -i "s/^#DisableSandboxSyscalls$/DisableSandboxSyscalls/" /etc/pacman.conf
            useradd -m builder
            chown -R builder /work
            su builder -c "makepkg --printsrcinfo" > .SRCINFO
          '
          echo "── rendered .SRCINFO ──"
          cat aur-work/.SRCINFO

      # ── Upload artifacts so dry runs are inspectable from the Actions UI ───
      # Retention is short because the rendered files are reproducible from
      # PKGBUILD.in + version + sha at any point.
      - name: Upload rendered artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aur-package-${{ steps.version.outputs.version }}
          path: |
            aur-work/PKGBUILD
            aur-work/.SRCINFO
            aur-work/himmelblau.install
          retention-days: 14
          if-no-files-found: error

      # ── Publish to AUR (or skip on dry_run) ─────────────────────────────────
      # The action handles: SSH key setup, AUR git clone, copy, .SRCINFO
      # generation via makepkg inside archlinux:latest, commit, push.
      # Pinned to v4.1.3 (resolved via gh api at planning time).
      - name: Publish to AUR
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: himmelblau
          pkgbuild: aur-work/PKGBUILD
          assets: aur-work/himmelblau.install
          commit_username: GitHub Actions
          commit_email: actions@github.com
          commit_message: "Update to ${{ steps.version.outputs.version }}"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          ssh_keyscan_types: ed25519

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::notice::Dry run complete. PKGBUILD rendered + validated, AUR push skipped."
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "SHA256:  ${{ steps.sha256.outputs.sha256 }}"
