---
name: Validate AUR Package

# Validation-only CI for the AUR PKGBUILD: renders platform/arch/PKGBUILD.in
# against an upstream release tarball, runs the full lint + build harness
# inside an archlinux:base-devel container, and namcaps the built package.
# Does NOT publish to AUR — that's aur-publish.yml's job.
#
# Triggers:
#   - push to any aur/** branch (catches regressions during PKGBUILD work)
#   - pull_request touching the packaging surface (catches them in review)
#   - workflow_dispatch with optional version override (manual smoke test)
#
# Architecture:
#   - Installs podman on the ubuntu-latest runner
#   - Invokes platform/arch/test/lint.sh --build, same harness humans run locally
#   - Uploads the built .pkg.tar.zst as a workflow artifact for inspection
on:
  push:
    branches:
      - 'aur/**'
    paths:
      - 'platform/arch/**'
      - '.github/workflows/aur-validate.yml'
  pull_request:
    paths:
      - 'platform/arch/**'
      - '.github/workflows/aur-validate.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build against (default: latest published release)'
        required: false
        type: string

permissions:
  contents: read

# Multiple commits on the same aur/** branch supersede each other; latest wins.
# PRs cancel previous in-flight runs (typical PR-CI behaviour).
concurrency:
  group: aur-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Build PKGBUILD in archlinux container
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SOURCE_REPO: himmelblau-idm/himmelblau

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # lint.sh derives the default version from `git tag`; fetch tags so
          # auto-detection works on PRs and feature branches.
          fetch-depth: 0

      # ── Install podman ──────────────────────────────────────────────────────
      # ubuntu-latest provides docker by default. lint.sh is podman-specific
      # because that's what works equivalently on Linux + macOS hosts; rather
      # than fork the harness logic into a docker variant, we install podman
      # on the runner so the same harness covers both human and CI use.
      - name: Install podman
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends podman
          podman --version

      # ── Resolve target version ──────────────────────────────────────────────
      # Priority: workflow_dispatch input → GitHub latest release on SOURCE_REPO.
      # We deliberately do NOT default to the latest *local* tag because forks
      # may carry experimental tags ahead of upstream releases.
      - name: Resolve target version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION#v}"
            echo "Source: workflow_dispatch input → ${VERSION}"
          else
            VERSION="$(gh release view --repo "${SOURCE_REPO}" --json tagName -q '.tagName' | sed 's/^v//')"
            echo "Source: GitHub latest release on ${SOURCE_REPO} → ${VERSION}"
          fi
          if [ -z "${VERSION}" ]; then
            echo "::error::Could not resolve a version to validate"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      # ── Run the same harness humans run locally ─────────────────────────────
      # --build performs: render, bash -n, namcap PKGBUILD, makepkg --printsrcinfo,
      # makepkg -s (full build), namcap on the .pkg.tar.zst output. Any non-zero
      # exit fails this step. Total runtime on ubuntu-latest x86_64: ~10-15 min.
      - name: Validate PKGBUILD (lint + full container build)
        run: |
          set -euo pipefail
          ./platform/arch/test/lint.sh --build --version "${{ steps.version.outputs.version }}"

      # ── Collect the built package for inspection ────────────────────────────
      # On success there will be a single .pkg.tar.zst inside the container's
      # /work directory. We re-export it from the container's last layer via
      # `podman cp`-style retrieval — actually simpler: re-run the rendered
      # PKGBUILD section to copy the artifact out of a fresh container.
      # In practice the harness leaves nothing on the host; we'd need to
      # restructure lint.sh to expose the artifact. For now, the workflow
      # success is the signal; future enhancement: artifact export.
      - name: Note artifact-export status
        if: success()
        run: |
          echo "::notice::PKGBUILD built cleanly inside container."
          echo "Artifact export not yet wired (lint.sh leaves output in container scratch)."
          echo "Future enhancement: tee makepkg output dir to a host mount and upload-artifact it."
