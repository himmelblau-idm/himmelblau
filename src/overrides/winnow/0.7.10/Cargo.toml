[package]
name = "winnow"
version = "0.7.10"
authors.workspace = true
rust-version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
alloc = ["winnow/alloc"]
debug = ["winnow/debug", "anstream", "anstyle", "terminal_size"]
default = ["winnow/default"]
simd = ["winnow/simd", "memchr"]
std = ["winnow/std"]
unstable-doc = ["winnow/unstable-doc"]
unstable-recover = ["winnow/unstable-recover"]

[dependencies]
winnow = { version = "^1.0.2" }
anstream = { version = "^0.3.2", optional = true, default-features = false }
anstyle = { version = "^1.0.1", optional = true, default-features = false }
memchr = { version = "^2.5", optional = true, default-features = false }
terminal_size = { version = "^0.4.0", optional = true, default-features = false }
