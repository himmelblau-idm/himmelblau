# ProtectSystem=strict in himmelblaud-orchestrator.service can only bind
# ReadWritePaths that exist when systemd builds the service mount namespace.
# These runtime directories are volatile across reboots, but Podman and OCI
# runtimes need them before the browser container can start.
d /run/netns 0755 root root -
d /run/crun 0700 root root -
d /run/runc 0700 root root -
