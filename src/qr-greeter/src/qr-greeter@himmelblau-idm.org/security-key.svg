<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- USB Security Key - horizontal layout resembling a YubiKey -->
  <!-- Main body -->
  <rect x="10" y="20" width="140" height="60" rx="10" ry="10" fill="#cccccc"/>
  <!-- USB connector -->
  <rect x="150" y="28" width="40" height="44" rx="3" ry="3" fill="#999999"/>
  <!-- USB connector inner -->
  <rect x="160" y="34" width="20" height="12" rx="2" ry="2" fill="#666666"/>
  <rect x="160" y="54" width="20" height="12" rx="2" ry="2" fill="#666666"/>
  <!-- Key circle / touch area -->
  <circle cx="80" cy="50" r="20" fill="none" stroke="#4a90d9" stroke-width="3"/>
  <!-- Key icon inside circle - centered -->
  <circle cx="80" cy="45" r="6" fill="#4a90d9"/>
  <rect x="78" y="49" width="4" height="12" rx="1" ry="1" fill="#4a90d9"/>
  <rect x="82" y="53" width="6" height="3" rx="1" ry="1" fill="#4a90d9"/>
  <rect x="82" y="57" width="4" height="3" rx="1" ry="1" fill="#4a90d9"/>
  <!-- Keyhole on body -->
  <circle cx="35" cy="50" r="4" fill="#aaaaaa"/>
</svg>
